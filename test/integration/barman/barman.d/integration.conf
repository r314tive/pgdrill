[integration]
description = pgdrill disposable Barman integration repository
active = true
conninfo = host=/validation/source-socket port=55431 user=postgres dbname=postgres
backup_method = local-rsync
backup_options = concurrent_backup
archiver = on
streaming_archiver = off
path_prefix = /usr/lib/postgresql/18/bin
immediate_checkpoint = true
minimum_redundancy = 1
