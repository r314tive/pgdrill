cluster:
  name: walg-field-postgresql-18

provider:
  type: wal-g
  binary: /validation/bin/wal-g-pg-24.04-aarch64
  timeout: 5m
  wal_verify:
    enabled: true
    checks:
      - integrity
    timeout: 5m
  env:
    WALG_FILE_PREFIX: /validation/repository
    WALG_COMPRESSION_METHOD: lz4

target:
  type: local
  work_dir: /validation/work/restore
  postgres_binary: /usr/lib/postgresql/18/bin/postgres
  postgres_port: 55432
  startup_timeout: 5s
  shutdown_timeout: 10s
  remove_work_dir: true

restore:
  timeout: 10m
  verify_backup:
    enabled: false

recovery:
  target: latest

policy:
  maximum_rto: 5m
  maximum_rpo: 5m
  maximum_backup_age: 1h
  require_recovery_target: true
  require_cleanup: true

probes:
  - type: pg_isready
    binary: /usr/lib/postgresql/18/bin/pg_isready
    timeout: 30s
  - type: sql
    name: post_backup_wal_replayed
    binary: /usr/lib/postgresql/18/bin/psql
    query: "select 1 / case when count(*) = 101 and bool_or(payload = 'post-backup-wal-sentinel') then 1 else 0 end from public.pgdrill_field_probe"
    timeout: 30s
  - type: pg_dump
    name: schema_dump
    binary: /usr/lib/postgresql/18/bin/pg_dump
    mode: schema
    timeout: 1m

report:
  format: json
  path: /validation/output/report.json
