schema_version: pgdrill.compatibility-matrix/v1alpha1
updated_at: "2026-07-21"
entries:
  - id: provider.barman.fixture
    component: provider
    implementation: barman
    evidence_level: fixture
    capabilities:
      - catalog_discovery
      - catalog_validation_contract
      - local_restore_planning
    recovery_targets:
      - latest
      - immediate
      - timestamp
      - lsn
      - xid
      - restore_point
    evidence:
      - kind: fixture
        ref: internal/adapters/barman/testdata/list-backups.json
      - kind: fixture
        ref: internal/adapters/barman/testdata/list-backups-keyed.json
      - kind: conformance_test
        ref: internal/adapters/barman/adapter_test.go#TestProviderConformance
    limitations:
      - No native Barman version or real repository has been validated.
      - Planning evidence does not prove WAL continuity or a completed restore.
