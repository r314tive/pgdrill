  - id: provider.wal-g.field
    component: provider
    implementation: wal-g
    evidence_level: field
    capabilities:
      - catalog_discovery
      - catalog_validation
      - end_to_end_restore
      - owned_cleanup
      - post_restore_probes
      - wal_replay
    recovery_targets:
      - latest
    implementation_versions:
      - "3.0.8"
    pgdrill_versions:
      - v0.1.0-dev
    pgdrill_commits:
      - 8d69347e688efe33d53371c0d94953a89fd20495
    postgresql_versions:
      - "18.3"
    platforms:
      - linux/arm64
    observed_at: "2026-07-21"
    evidence:
      - kind: drill_report
        ref: compatibility/evidence/wal-g-v3.0.8-postgresql-18.3-linux-arm64/report.json
      - kind: field_note
        ref: compatibility/evidence/wal-g-v3.0.8-postgresql-18.3-linux-arm64/README.md#validated-scope
    limitations:
      - One disposable local file repository does not establish remote object-storage compatibility.
      - Only latest recovery from one full backup with one post-backup WAL segment was exercised.
      - The tested pgdrill binary was a development build at an exact commit, not a published release artifact.
  - id: provider.wal-g.fixture
    component: provider
    implementation: wal-g
    evidence_level: fixture
    capabilities:
      - catalog_discovery
      - catalog_validation_contract
      - local_restore_planning
    recovery_targets:
      - latest
      - immediate
      - timestamp
      - lsn
      - xid
      - restore_point
    evidence:
      - kind: fixture
        ref: internal/adapters/walg/testdata/backup-list-detail.json
      - kind: conformance_test
        ref: internal/adapters/walg/adapter_test.go#TestProviderConformance
    limitations:
      - This fixture entry makes no native WAL-G version claim; exact field observations are recorded separately.
      - Planning evidence does not prove WAL continuity or a completed restore.
  - id: target.cnpg.controlled
    component: target
    implementation: cnpg
    evidence_level: controlled
    capabilities:
      - managed_restore_lifecycle
      - mutation_reconciliation
      - owned_cleanup
    recovery_targets:
      - latest
    evidence:
      - kind: conformance_test
        ref: internal/targets/cnpg/verify_target_test.go#TestTargetConformance
    limitations:
      - The conformance client is controlled and does not contact a Kubernetes API.
      - Non-latest recovery targets are rejected before resource creation.
  - id: target.cnpg.field
    component: target
    implementation: cnpg
    evidence_level: field
    capabilities:
      - end_to_end_restore
      - owned_cleanup
      - readiness_and_sql_probes
    recovery_targets:
      - latest
    implementation_versions:
      - "1.26.0"
    pgdrill_versions:
      - v0.1.0-alpha.9
    pgdrill_commits:
      - e5025d7fa4b129091b08a47cf58186c4565df855
    postgresql_versions:
      - "15.13"
    platforms:
      - linux/amd64
    observed_at: "2026-07-20"
    evidence:
      - kind: field_note
        ref: docs/compatibility.md#cnpg-field-validation
    limitations:
      - This is one disposable-environment observation, not a production support claim or RTO guarantee.
      - Timestamp PITR, other PostgreSQL and CNPG versions, storage classes, and failure modes remain unvalidated.
      - The CNPG barmanObjectStore bootstrap does not validate the native Barman CLI adapter.
  - id: target.local.controlled
    component: target
    implementation: local
    evidence_level: controlled
    capabilities:
      - filesystem_ownership
      - mutation_reconciliation
      - postgres_process_lifecycle
    evidence:
      - kind: conformance_test
        ref: internal/targets/local/target_test.go#TestTargetConformance
    limitations:
      - PostgreSQL is represented by a controlled executable with a postmaster.pid contract.
      - Real PostgreSQL startup and native provider repositories remain environment-specific gates.
