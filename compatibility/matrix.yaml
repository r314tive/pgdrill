      - a9c6d4cdf7a7452e5e4021babd172e42320074f6
    postgresql_versions:
      - "18.3"
    platforms:
      - linux/arm64
    observed_at: "2026-07-21"
    evidence:
      - kind: drill_report
        ref: compatibility/evidence/barman-v3.19.1-postgresql-18.3-linux-arm64/report.json
      - kind: field_note
        ref: compatibility/evidence/barman-v3.19.1-postgresql-18.3-linux-arm64/README.md#validated-scope
    limitations:
      - One same-host local-rsync repository does not establish SSH, streaming-backup, or cloud-storage compatibility.
      - Only latest recovery from one full backup with one post-backup WAL segment was exercised.
      - The tested pgdrill binary was a development build at an exact commit, not a published release artifact.
