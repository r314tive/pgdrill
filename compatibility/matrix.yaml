    observed_at: "2026-07-20"
    evidence:
      - kind: field_note
        ref: docs/compatibility.md#cnpg-field-validation
    limitations:
      - This is one disposable-environment observation, not a production support claim or RTO guarantee.
      - Timestamp PITR, other PostgreSQL and CNPG versions, storage classes, and failure modes remain unvalidated.
      - The CNPG barmanObjectStore bootstrap does not validate the native Barman CLI adapter.
