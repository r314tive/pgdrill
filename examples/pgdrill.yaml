cluster:
  name: production-main

provider:
  type: wal-g
  timeout: 30m
  wal_verify:
    enabled: false
  env:
    WALG_FILE_PREFIX: /backups/postgresql/production-main

target:
  type: local
  work_dir: /var/tmp/pgdrill/production-main

restore:
  timeout: 6h
  verify_backup:
    enabled: false

recovery:
  target: latest

probes:
  - type: pg_isready
    timeout: 10s
  - type: sql
    name: select_1
    query: "select 1"
    timeout: 10s
  - type: pg_dump
    mode: schema
    timeout: 30s

report:
  format: json
  path: ./pgdrill-report.json
